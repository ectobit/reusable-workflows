on:
  workflow_call:
    inputs:
      go-version:
        type: string
        required: false
        default: 1.26.4
        description: go version to use for checks
      golangci-lint-version:
        type: string
        required: false
        default: v2.12.2
        description: golangci-lint version to use for lint checks
      govulncheck-version:
        type: string
        required: false
        default: v1.1.4
        description: govulncheck version to use for vulnerability checks
      lint-command:
        type: string
        required: false
        default: golangci-lint run
        description: custom lint command
      test-command:
        type: string
        required: false
        description: command to run tests, i.e. go test -race ./...
      go-experiment:
        type: string
        required: false
        default: ''
        description: GOEXPERIMENT environment variable for Go commands

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Set up go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
      - name: Check out
        uses: actions/checkout@v7
      - name: Set up go cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up tools path
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Set up tools cache
        uses: actions/cache@v6
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-go-tools-${{ inputs.go-version }}-${{ inputs.golangci-lint-version }}-${{ inputs.govulncheck-version }}
      - name: Set up linters and vulnerabilities checkers
        env:
          GOEXPERIMENT: ${{ inputs.go-experiment }}
          GOLANGCI_LINT_VERSION: ${{ inputs.golangci-lint-version }}
          GOVULNCHECK_VERSION: ${{ inputs.govulncheck-version }}
        run: |
          set -euo pipefail

          TOOL_BIN="$HOME/.local/bin"

          if [ ! -x "$TOOL_BIN/golangci-lint" ]; then
            version="${GOLANGCI_LINT_VERSION#v}"
            os="$(uname -s | tr '[:upper:]' '[:lower:]')"
            arch="$(uname -m)"
            case "$arch" in
              x86_64) arch="amd64" ;;
              aarch64) arch="arm64" ;;
            esac

            archive="golangci-lint-${version}-${os}-${arch}.tar.gz"
            checksums="golangci-lint-${version}-checksums.txt"
            base_url="https://github.com/golangci/golangci-lint/releases/download/${GOLANGCI_LINT_VERSION}"
            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' EXIT

            curl -fsSLo "$tmpdir/$archive" "$base_url/$archive"
            curl -fsSLo "$tmpdir/$checksums" "$base_url/$checksums"
            grep "$archive$" "$tmpdir/$checksums" | (cd "$tmpdir" && sha256sum -c -)
            tar -xzf "$tmpdir/$archive" -C "$tmpdir"
            install "$tmpdir/golangci-lint-${version}-${os}-${arch}/golangci-lint" "$TOOL_BIN/golangci-lint"
          fi

          if [ ! -x "$TOOL_BIN/govulncheck" ]; then
            GOBIN="$TOOL_BIN" go install "golang.org/x/vuln/cmd/govulncheck@$GOVULNCHECK_VERSION"
          fi
      - name: Lint
        env:
          GOEXPERIMENT: ${{ inputs.go-experiment }}
          LINT_COMMAND: ${{ inputs.lint-command }}
        run: |
          bash -eo pipefail -c "$LINT_COMMAND"
          govulncheck ./...
      - name: Go fix
        env:
          GOEXPERIMENT: ${{ inputs.go-experiment }}
        run: go fix -diff ./...
      - name: Test
        env:
          GOEXPERIMENT: ${{ inputs.go-experiment }}
          TEST_COMMAND: ${{ inputs.test-command }}
        if: ${{ inputs.test-command != '' }}
        run: bash -eo pipefail -c "$TEST_COMMAND"
