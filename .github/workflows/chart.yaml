on:
  workflow_call:
    inputs:
      chart:
        type: string
        required: true
        description: chart name
      release:
        type: boolean
        required: false
        default: true
        description: weather to release the chart to charts.ectobit.com registry
    secrets:
      helm-repo-username:
        required: false
        description: username to use for charts registry login
      helm-repo-password:
        required: false
        description: password to use for charts registry login
      gpg-signing-key:
        required: false
        description: gpg key to sign chart package

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0
      - name: Check out
        uses: actions/checkout@v6
      - name: Lint
        env:
          CHART: ${{ inputs.chart }}
        run: helm lint "$CHART"
      - name: Configure GPG key
        if: ${{ inputs.release }}
        env:
          GPG_SIGNING_KEY: ${{ secrets.gpg-signing-key }}
        run: |
          mkdir -p ~/.gnupg/
          printf '%s' "$GPG_SIGNING_KEY" | base64 -d > ~/.gnupg/pubring.gpg
      - name: Release
        if: ${{ inputs.release }}
        env:
          CHART: ${{ inputs.chart }}
          HELM_REPO_USERNAME: ${{ secrets.helm-repo-username }}
          HELM_REPO_PASSWORD: ${{ secrets.helm-repo-password }}
        run: |
          FILE_PATH=$(helm package --sign --key 'Boban Acimovic' "$CHART" | awk '{print $8}')
          FILE=$(basename "${FILE_PATH}")
          echo "Uploading ${FILE} chart and provenance ${FILE}.prov"
          curl -u "${HELM_REPO_USERNAME}:${HELM_REPO_PASSWORD}" \
            -F "chart=@${FILE}" \
            -F "prov=@${FILE}.prov" \
            https://charts.ectobit.com/api/charts
